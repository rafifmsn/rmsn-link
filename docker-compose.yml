version: '3.8'

services:
  rmsn-link:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_BRAND_NAME: "${PUBLIC_BRAND_NAME:-Rafif Muchsin}"
        PUBLIC_APP_URL: "${PUBLIC_APP_URL:-https://s.rafifmsn.com}"
