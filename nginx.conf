server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Support fallback to 404.html for client-side redirection resolution
        try_files $uri $uri/ /404.html;
    }

    # Custom 404 handler
    error_page 404 /404.html;
}
